<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ya-ho Player (extracted)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" />
  <link rel="stylesheet" href="player.css" />
</head>
<body>
  <main class="shell">
    <h1>🎵 YouTube Player</h1>
    <p class="hint">Ya-ho! 앱에서 플레이어 부분만 분리한 독립 버전입니다.</p>
    <button type="button" class="open-btn" id="openBtn">플레이어 열기</button>
  </main>

  <div class="player" id="player" hidden>
    <div class="player-titlebar">
      <span class="player-now">🎵 NOW PLAYING</span>
      <div class="player-tbtns">
        <button class="tbtn" id="playerMin" aria-label="접기">▁</button>
        <button class="tbtn" id="playerClose" aria-label="닫기">✕</button>
      </div>
    </div>
    <div class="player-body">
      <div class="player-head">
        <div class="player-art" id="playerArt"></div>
        <div class="player-meta">
          <div class="player-title" id="playerTitle">노래를 추가해 주세요</div>
          <div class="player-artist" id="playerArtist">아래에 유튜브 링크 붙여넣기 ↓</div>
        </div>
        <div class="player-wave" id="playerWave"><i></i><i></i><i></i><i></i></div>
      </div>
      <div class="player-prog">
        <span class="p-cur" id="pCur">0:00</span>
        <div class="p-bar" id="pBar"><span id="pFill"></span></div>
        <span class="p-dur" id="pDur">0:00</span>
      </div>
      <div class="player-ctrl">
        <button class="pc" id="pPrev">⏮</button>
        <button class="pc big" id="pPlay">▶</button>
        <button class="pc" id="pNext">⏭</button>
        <button class="pc rep" id="pRepeat" title="반복">🔁</button>
      </div>
      <div class="player-vol">
        <span class="vol-ico">🔉</span>
        <input id="pVol" type="range" min="0" max="100" value="70" />
        <span class="vol-val" id="pVolVal">70</span>
      </div>
      <form class="song-add" id="songForm">
        <input id="songUrl" placeholder="유튜브 링크 붙여넣기" />
        <button type="submit">＋</button>
      </form>
      <ul class="playlist" id="playlist"></ul>
    </div>
  </div>

  <div id="ytPlayer"></div>
  <div class="toast" id="toast" hidden></div>

  <script src="player.js"></script>
</body>
</html>
