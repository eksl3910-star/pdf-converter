# Oracle Cloud Always Free VPS용 (올인원)
# 사용: docker compose -f docker-compose.oracle.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.hf
    restart: unless-stopped
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "7860"
      HOSTNAME: 0.0.0.0
      MAX_FILE_SIZE: "0"
      TEMP_DIR: /tmp/conversions
    volumes:
      - conversion-temp:/tmp/conversions
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7860').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - with-caddy

volumes:
  conversion-temp:
  caddy-data:
  caddy-config:
